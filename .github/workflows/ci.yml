name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  MIX_ENV: test
  TEST_DATABASE_URL: ecto://postgres:postgres@localhost:5432/request_bin_test

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: request_bin_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d request_bin_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          otp-version: "28.3"
          elixir-version: "1.20.2"

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile without warnings
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
